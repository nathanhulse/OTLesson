<title>God's Draft Day</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Barlow:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--gold:#C9A84C;--gold2:#F0D080;--dark:#06080f}
html,body{width:100%;min-height:100vh;background:var(--dark);color:#fff;font-family:'Barlow',sans-serif;overflow-x:hidden}
.bbn{font-family:'Bebas Neue',cursive}
.bbc{font-family:'Barlow Condensed',sans-serif}
.screen{display:none;width:100%;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.screen.active{display:flex}

/* WAIT */
#s-wait{background:linear-gradient(160deg,#06080f,#0a1628);text-align:center}
.wait-logo{font-family:'Bebas Neue',cursive;font-size:52px;letter-spacing:4px;color:var(--gold);margin-bottom:4px}
.wait-sub{font-family:'Barlow Condensed',sans-serif;font-size:16px;letter-spacing:3px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:32px}
.wait-spinner{width:52px;height:52px;border-radius:50%;border:3px solid rgba(201,168,76,0.25);border-top-color:var(--gold);animation:spin 1s linear infinite;margin:0 auto 24px}
@keyframes spin{to{transform:rotate(360deg)}}
.wait-msg{font-family:'Barlow Condensed',sans-serif;font-size:17px;color:rgba(255,255,255,0.4)}

/* SCENARIO */
#s-scenario{background:var(--dark);padding:20px 16px;justify-content:flex-start;align-items:stretch}
.sc-logo-img{width:100px;height:100px;object-fit:contain;display:block;margin:0 auto 12px}
.sc-franchise{font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:3px;color:#fff;text-align:center;line-height:1;margin-bottom:4px}
.sc-city{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--gold);text-align:center;text-transform:uppercase;margin-bottom:16px}
.sc-need-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.2);text-transform:uppercase;margin-bottom:6px;text-align:center}
.sc-need-txt{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;color:rgba(255,255,255,0.8);line-height:1.5;text-align:center}

/* VOTE */
#s-vote{background:var(--dark);padding:12px 12px 24px;align-items:stretch;justify-content:flex-start}
.vote-hdr{text-align:center;margin-bottom:12px}
.vote-title{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:3px;color:var(--gold);margin-bottom:2px}
.vote-sub{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase}
.vote-cards{display:flex;flex-direction:column;gap:12px;width:100%}

/* PLAYER CARD — phone */
.vote-card{background:#0d1927;border:2px solid rgba(255,255,255,0.1);border-radius:16px;overflow:hidden;cursor:pointer;transition:all 0.2s;position:relative;-webkit-user-select:none;user-select:none}
.vote-card:active{transform:scale(0.98)}
.vote-card.selected{border-color:var(--gold);background:#0f2040}
.vote-card.other{opacity:0.4}
.locked-badge{display:none;position:absolute;top:10px;right:10px;background:var(--gold);color:#06080f;font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:2px;padding:4px 12px;border-radius:5px;z-index:2}
.vote-card.selected .locked-badge{display:block}
.vc-stripe{height:5px;width:100%}

/* Card top — big image + info */
.vc-top{display:flex;gap:0}
.vc-img{width:110px;height:140px;object-fit:cover;object-position:top;flex-shrink:0;background:#1a2535;display:block}
.vc-right{flex:1;padding:12px 14px}
.vc-cand-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.25);text-transform:uppercase;margin-bottom:3px}
.vc-name{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px;color:#fff;line-height:1;margin-bottom:2px}
.vc-nick{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-style:italic;color:rgba(255,255,255,0.35);margin-bottom:6px}
.vc-vitals{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.vc-vp{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);text-transform:uppercase}
.vc-from{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:rgba(255,255,255,0.25)}
.vc-ovr-block{display:flex;align-items:baseline;gap:4px;margin-top:6px}
.vc-ovr-n{font-family:'Bebas Neue',cursive;font-size:38px;line-height:1}
.vc-ovr-l{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.2)}

/* Stats row */
.vc-stats{display:grid;grid-template-columns:repeat(4,1fr);background:rgba(255,255,255,0.04)}
.vc-sc{padding:7px 4px;text-align:center;border-right:1px solid rgba(255,255,255,0.04)}
.vc-sc:last-child{border-right:none}
.vc-sv{font-family:'Bebas Neue',cursive;font-size:17px;color:#fff;line-height:1}
.vc-sl{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.22);margin-top:1px}

/* Bars */
.vc-bars{padding:8px 12px}
.vc-br{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.vc-bl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.35);width:58px;flex-shrink:0}
.vc-bt{flex:1;height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.vc-bf{height:100%;border-radius:2px}
.vc-bn{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;color:rgba(255,255,255,0.38);width:18px;text-align:right}

/* Scout */
.vc-scout{padding:6px 12px 10px;border-top:1px solid rgba(255,255,255,0.05);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-style:italic;color:rgba(255,255,255,0.38);line-height:1.4}

/* Lock button */
.lock-btn{width:100%;padding:15px;font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;background:rgba(201,168,76,0.12);color:rgba(201,168,76,0.4);border:2px solid rgba(201,168,76,0.25);border-radius:12px;cursor:not-allowed;margin-top:14px;transition:all 0.2s}
.lock-btn.ready{background:var(--gold);color:#06080f;cursor:pointer;border-color:var(--gold)}
.lock-btn.ready:active{transform:scale(0.97)}
.lock-btn.done{background:#0f2a0f;color:#22c55e;border-color:#22c55e;cursor:default}

/* VOTED */
#s-voted{background:var(--dark);text-align:center}
.voted-check{font-size:72px;margin-bottom:14px}
.voted-title{font-family:'Bebas Neue',cursive;font-size:40px;letter-spacing:3px;color:#22c55e;margin-bottom:8px}
.voted-msg{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:rgba(255,255,255,0.4)}
.voted-pick{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;color:var(--gold);margin-top:12px;line-height:1.3;max-width:300px}

/* RESULTS */
#s-results{background:var(--dark);padding:24px 16px;justify-content:flex-start}
.results-ttl{font-family:'Bebas Neue',cursive;font-size:30px;letter-spacing:4px;color:rgba(255,255,255,0.25);text-align:center;margin-bottom:20px}
.res-item{margin-bottom:18px;width:100%;max-width:360px}
.res-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.res-nm{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:rgba(255,255,255,0.75)}
.res-pct{font-family:'Bebas Neue',cursive;font-size:36px;line-height:1}
.res-bg{height:10px;background:rgba(255,255,255,0.07);border-radius:5px;overflow:hidden}
.res-fill{height:100%;border-radius:5px;transition:width 0.8s}

/* REVEAL */
#s-reveal{background:linear-gradient(160deg,#06080f,#0e1f3a);text-align:center;padding:24px 16px}
.rev-comm{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;color:rgba(201,168,76,0.45);text-transform:uppercase;margin-bottom:8px}
.rev-pick{font-family:'Bebas Neue',cursive;font-size:56px;color:var(--gold);line-height:1;margin-bottom:6px}
.rev-imgs{display:flex;gap:16px;justify-content:center;margin-bottom:14px}
.rev-img{width:130px;height:160px;object-fit:cover;object-position:top;border-radius:12px;border:3px solid var(--gold);background:#1a2535}
.rev-name{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;color:#fff;margin-bottom:14px;line-height:1.1}
.rev-why{font-family:'Barlow Condensed',sans-serif;font-size:16px;line-height:1.65;color:rgba(255,255,255,0.72);max-width:360px;margin:0 auto 14px}
.rev-why b{color:var(--gold2)}
.rev-quip{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;font-style:italic;color:var(--gold);padding:12px 16px;background:rgba(201,168,76,0.08);border-radius:8px;border-left:3px solid var(--gold);text-align:left;max-width:360px;margin:0 auto}

/* SCRIPTURE */
#s-scripture{background:var(--dark);text-align:center;padding:32px 20px}
.sc-icon{font-size:44px;margin-bottom:14px;opacity:0.4}
.sc-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;color:rgba(255,255,255,0.2);text-transform:uppercase;margin-bottom:14px}
.sc-txt{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-style:italic;color:#fff;line-height:1.55;max-width:340px;margin:0 auto 10px}
.sc-ref{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;color:var(--gold)}
</style>
</head>

const pid=Math.random().toString(36).slice(2);
let currentSc=null,selectedChoice=null,hasVoted=false;

const proto=location.protocol==='https:'?'wss':'ws';
const ws=new WebSocket(`${proto}://${location.host}`);

ws.onopen=()=>{document.getElementById('wait-msg').textContent='Connected — watch the big screen';};
ws.onerror=()=>{document.getElementById('wait-msg').textContent='Connection error — try refreshing';};
ws.onmessage=e=>{
  const msg=JSON.parse(e.data);
  if(msg.type==='state')handleState(msg.state);
  if(msg.type==='votes')updateResults(msg.votes,msg.total);
};

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

function handleState(state){
  const sc=SCENARIOS[state.scenarioIdx];
  currentSc=sc;

  if(state.screen==='intro'){
    show('s-wait');
    document.getElementById('wait-msg').textContent='Draft night is starting soon...';
    return;
  }
  if(state.screen==='scenario'){
    selectedChoice=null;hasVoted=false;
    document.getElementById('sc-logo').src=IMGS[sc.logo]||'';
    document.getElementById('sc-name').textContent=sc.name;
    document.getElementById('sc-city').textContent=sc.city;
    document.getElementById('sc-need').textContent=sc.need;
    show('s-scenario');
    return;
  }
  if(state.screen==='voting'){
    if(sc.isRuth){
      document.getElementById('voted-pick').textContent='Ruth signed. Watch the big screen.';
      show('s-voted');return;
    }
    buildVoteCards(sc);show('s-vote');
    return;
  }
  if(state.screen==='results'){
    updateResults(state.votes||{},Object.values(state.votes||{}).reduce((a,b)=>a+b,0));
    show('s-results');return;
  }
  if(state.screen==='reveal'){
    const revImgs=sc.revImgs||[];
    document.getElementById('rev-pick').textContent=sc.revPick||'#1 Overall Pick';
    document.getElementById('rev-imgs').innerHTML=revImgs.map(k=>{
      const p=sc.players.find(p=>p.img===k);
      return `<img class="rev-img" src="${IMGS[k]||''}" alt="" style="${p?.isPhoto?'object-position:center top':'object-position:top'}">`;
    }).join('');
    document.getElementById('rev-name').textContent=sc.revName||'';
    document.getElementById('rev-why').innerHTML=sc.rWhy||'';
    document.getElementById('rev-quip').textContent=sc.rQuip||'';
    show('s-reveal');return;
  }
  if(state.screen==='scripture'){
    const parts=(sc.scripture||'').split('—');
    document.getElementById('sc-txt').textContent=parts[0]?.trim()||'';
    document.getElementById('sc-ref').textContent=parts[1]?'— '+parts[1].trim():'';
    show('s-scripture');return;
  }
  // discuss, finale, yourturn — show waiting with message
  show('s-wait');
  document.getElementById('wait-msg').textContent='Watch the big screen...';
}

function buildVoteCards(sc){
  selectedChoice=null;hasVoted=false;
  const btn=document.getElementById('lock-btn');
  btn.textContent='Select a candidate first';btn.disabled=true;btn.className='lock-btn bbn';
  document.getElementById('vote-cards').innerHTML=sc.players.map((p,i)=>{
    const bars=p.bars.map(b=>`<div class="vc-br"><span class="vc-bl bbc">${b.l}</span><div class="vc-bt"><div class="vc-bf" style="width:${Math.max(0,typeof b.v==='number'?b.v:0)}%;background:${b.c}"></div></div><span class="vc-bn bbc">${typeof b.v==='number'?Math.max(0,b.v):''}</span></div>`).join('');
    const stats=p.stats.map(st=>`<div class="vc-sc"><div class="vc-sv bbn">${st.v}</div><div class="vc-sl bbc">${st.l}</div></div>`).join('');
    return `<div class="vote-card" id="vc-${i}" onclick="selectCard(${i})">
      <div class="locked-badge bbn">✓ LOCKED IN</div>
      <div class="vc-stripe" style="background:${p.stripe}"></div>
      <div class="vc-top">
        <img class="vc-img" src="${IMGS[p.img]||''}" alt="${p.name}" style="${p.isPhoto?'object-position:center top':'object-position:top'}">
        <div class="vc-right">
          <div class="vc-cand-lbl bbc">Candidate ${i===0?'A':'B'}</div>
          <div class="vc-name bbn">${p.name}</div>
          <div class="vc-nick bbc">${p.nick}</div>
          <div class="vc-vitals"><span class="vc-vp bbc">${p.pos}</span><span class="vc-vp bbc">${p.ht}</span></div>
          <div class="vc-from bbc">${p.from}</div>
          <div class="vc-ovr-block"><div class="vc-ovr-n bbn" style="color:${p.ovrC}">${p.ovr}</div><div class="vc-ovr-l bbc">OVR</div></div>
        </div>
      </div>
      <div class="vc-stats">${stats}</div>
      <div class="vc-bars">${bars}</div>
      <div class="vc-scout bbc">${p.scout}</div>
    </div>`;
  }).join('');
}

function selectCard(i){
  if(hasVoted)return;
  selectedChoice=i;
  document.querySelectorAll('.vote-card').forEach((c,idx)=>{c.classList.toggle('selected',idx===i);c.classList.toggle('other',idx!==i);});
  const btn=document.getElementById('lock-btn');
  btn.textContent='Lock In Pick';btn.disabled=false;btn.className='lock-btn bbn ready';
}

function lockIn(){
  if(selectedChoice===null||hasVoted)return;
  ws.send(JSON.stringify({type:'vote',choice:selectedChoice,playerId:pid}));
  hasVoted=true;
  const btn=document.getElementById('lock-btn');
  btn.textContent='Vote Locked In ✓';btn.className='lock-btn bbn done';btn.disabled=true;
  document.getElementById('voted-pick').textContent=currentSc?.players[selectedChoice]?.name||'';
  setTimeout(()=>show('s-voted'),500);
}

function updateResults(votes,total){
  const sc=currentSc;if(!sc)return;
  const t=total||1;
  document.getElementById('res-bars').innerHTML=sc.players.map((p,i)=>{
    const v=votes[i]||0,pct=Math.round(v/t*100);
    return `<div class="res-item">
      <div class="res-row"><span class="res-nm bbc">${p.name.split('"')[0]}</span><span class="res-pct bbn" style="color:${p.stripe}">${pct}%</span></div>
      <div class="res-bg"><div class="res-fill" style="width:${pct}%;background:${p.stripe}"></div></div>
    </div>`;
  }).join('');
}
</script>
