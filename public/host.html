<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God's Draft Day — Host</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Barlow:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gold2:#F0D080;--dark:#06080f;--navy:#0a1628;}
html,body{width:100%;height:100%;background:var(--dark);color:#fff;font-family:'Barlow',sans-serif;overflow:hidden}
.bbn{font-family:'Bebas Neue',cursive}
.bbc{font-family:'Barlow Condensed',sans-serif}

/* ── SCREENS ── */
.screen{display:none;width:100vw;height:100vh;position:absolute;top:0;left:0}
.screen.active{display:flex;flex-direction:column}

/* ── INTRO SCREEN ── */
#s-intro{background:var(--dark);align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}
#s-intro::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,#1a2d4e 0%,var(--dark) 70%)}
.intro-content{position:relative;z-index:2;max-width:900px;padding:40px}
.intro-live{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:4px;color:var(--gold);opacity:0.7;text-transform:uppercase;margin-bottom:16px}
.intro-title{font-family:'Bebas Neue',cursive;font-size:clamp(60px,10vw,120px);letter-spacing:6px;color:var(--gold);line-height:0.9;margin-bottom:8px}
.intro-title span{color:#fff}
.intro-sub{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:4px;color:rgba(255,255,255,0.5);text-transform:uppercase;margin-bottom:40px}
.crew-row{display:flex;gap:20px;justify-content:center;margin-bottom:40px}
.crew-card{text-align:center}
.crew-img{width:120px;height:120px;border-radius:50%;object-fit:cover;object-position:top;border:3px solid var(--gold);background:#1a2535}
.crew-name{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;color:var(--gold);margin-top:8px}
.crew-role{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px}
.join-info{background:rgba(201,168,76,0.1);border:2px solid rgba(201,168,76,0.4);border-radius:16px;padding:20px 40px;display:inline-block;margin-bottom:32px}
.join-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:6px}
.join-url{font-family:'Bebas Neue',cursive;font-size:36px;letter-spacing:3px;color:var(--gold)}
.player-count{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:rgba(255,255,255,0.5);margin-top:8px;letter-spacing:1px}

/* ── SCENARIO SCREEN ── */
#s-scenario{background:var(--dark);justify-content:center;align-items:center;padding:40px}
.scenario-stage{width:100%;max-width:1100px;margin:0 auto;display:flex;gap:48px;align-items:center}
.sc-logo-wrap{flex-shrink:0;text-align:center}
.sc-logo{width:200px;height:200px;object-fit:contain}
.sc-logo-name{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;color:var(--gold);margin-top:12px}
.sc-logo-city{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.4);text-transform:uppercase}
.sc-content{flex:1}
.sc-round{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:4px;color:rgba(201,168,76,0.6);text-transform:uppercase;margin-bottom:8px}
.sc-name{font-family:'Bebas Neue',cursive;font-size:clamp(36px,5vw,64px);letter-spacing:3px;color:#fff;line-height:1;margin-bottom:8px}
.sc-need-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:8px}
.sc-need{font-family:'Barlow Condensed',sans-serif;font-size:clamp(16px,2vw,22px);font-weight:600;color:rgba(255,255,255,0.85);line-height:1.5;max-width:600px;margin-bottom:20px}
.sc-record{display:inline-block;font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:2px;padding:6px 18px;border-radius:6px;border:1px solid}

/* ── VOTING SCREEN ── */
#s-voting{background:var(--dark);padding:24px 32px}
.voting-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.voting-round{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:3px;color:var(--gold)}
.voting-status{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.4);text-transform:uppercase}
.vote-count-live{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--gold)}

.cards-stage{display:grid;grid-template-columns:1fr 1fr;gap:24px;flex:1;max-width:1100px;margin:0 auto;width:100%}
.big-card{border-radius:20px;overflow:hidden;background:#0d1927;border:2px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;position:relative;transition:border-color 0.3s}
.big-card.leading{border-color:var(--gold);box-shadow:0 0 30px rgba(201,168,76,0.2)}
.bc-stripe{height:6px}
.bc-body{padding:16px 20px;display:flex;gap:16px;align-items:flex-start;flex:1}
.bc-img{width:130px;height:160px;object-fit:cover;object-position:top;border-radius:12px;flex-shrink:0;background:#1a2535;border:2px solid rgba(255,255,255,0.1)}
.bc-info{flex:1}
.bc-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:4px}
.bc-name{font-family:'Bebas Neue',cursive;font-size:clamp(22px,3vw,36px);letter-spacing:2px;color:#fff;line-height:1;margin-bottom:2px}
.bc-nick{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-style:italic;color:rgba(255,255,255,0.4);margin-bottom:10px}
.bc-vitals{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.vital{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.55);text-transform:uppercase}
.bc-from{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:10px}
.bc-ovr{position:absolute;top:14px;right:18px;text-align:center}
.ovr-n{font-family:'Bebas Neue',cursive;font-size:52px;line-height:1}
.ovr-l{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.2);text-transform:uppercase}

/* stat bars */
.bc-bars{padding:10px 20px 14px}
.br{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.4);width:72px;flex-shrink:0}
.bt{flex:1;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width 0.6s}
.bn{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);width:22px;text-align:right}

/* vote bar */
.vote-bar-wrap{padding:10px 20px 16px;border-top:1px solid rgba(255,255,255,0.06)}
.vote-pct{font-family:'Bebas Neue',cursive;font-size:42px;color:var(--gold);line-height:1}
.vote-pct-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase}
.vote-bar-bg{height:8px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;margin-top:6px}
.vote-bar-fill{height:100%;border-radius:4px;transition:width 0.4s;background:var(--gold)}

/* ── RESULTS SCREEN ── */
#s-results{background:var(--dark);padding:24px 32px;justify-content:center}
.results-inner{max-width:1100px;width:100%;margin:0 auto}
.results-title{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:4px;color:rgba(255,255,255,0.3);text-align:center;margin-bottom:20px}
.results-bars{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.res-candidate{text-align:center}
.res-name{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;color:#fff;margin-bottom:8px}
.res-pct{font-family:'Bebas Neue',cursive;font-size:80px;line-height:1;margin-bottom:6px}
.res-bar-bg{height:12px;background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden;margin:0 20px 8px}
.res-bar-fill{height:100%;border-radius:6px;transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1)}
.res-count{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:rgba(255,255,255,0.4);letter-spacing:1px}

/* announcer */
.announcer-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px 24px;margin-bottom:20px}
.ann-who-row{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.ann-photo{width:60px;height:60px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid var(--gold)}
.ann-name{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;color:var(--gold)}
.ann-role{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1px}
.ann-quote{font-family:'Barlow Condensed',sans-serif;font-size:clamp(15px,2vw,20px);font-style:italic;color:rgba(255,255,255,0.8);line-height:1.5;padding:14px 18px;background:rgba(255,255,255,0.04);border-radius:10px;border-left:4px solid var(--gold)}

/* ── REVEAL SCREEN ── */
#s-reveal{background:linear-gradient(135deg,#06080f 0%,#0e1f3a 50%,#06080f 100%);justify-content:center;align-items:center;text-align:center;padding:32px}
.reveal-inner{max-width:900px;width:100%}
.rev-commissioner{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:4px;color:rgba(201,168,76,0.5);text-transform:uppercase;margin-bottom:12px}
.rev-pick-num{font-family:'Bebas Neue',cursive;font-size:clamp(60px,10vw,100px);color:var(--gold);line-height:1;margin-bottom:8px}
.rev-player-name{font-family:'Bebas Neue',cursive;font-size:clamp(28px,5vw,52px);letter-spacing:3px;color:#fff;margin-bottom:16px}
.rev-img{width:180px;height:220px;object-fit:cover;object-position:top;border-radius:16px;border:4px solid var(--gold);margin:0 auto 20px;display:block;background:#1a2535}
.rev-why{font-size:clamp(14px,1.8vw,18px);line-height:1.7;color:rgba(255,255,255,0.75);max-width:700px;margin:0 auto 16px}
.rev-why b{color:var(--gold2)}
.rev-quip{font-family:'Barlow Condensed',sans-serif;font-size:clamp(16px,2vw,22px);font-weight:700;font-style:italic;color:var(--gold);padding:14px 20px;background:rgba(201,168,76,0.08);border-radius:10px;border-left:4px solid var(--gold);display:inline-block;max-width:700px}

/* ── SCRIPTURE SCREEN ── */
#s-scripture{background:var(--dark);justify-content:center;align-items:center;text-align:center;padding:40px}
.scripture-inner{max-width:800px}
.sc-icon{font-size:48px;margin-bottom:16px;opacity:0.6}
.scripture-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:16px}
.scripture-text{font-family:'Barlow Condensed',sans-serif;font-size:clamp(20px,3vw,32px);font-style:italic;color:#fff;line-height:1.55;margin-bottom:12px}
.scripture-ref{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;color:var(--gold);margin-bottom:32px}
.next-up{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase}

/* ── HOST CONTROLS ── */
.host-controls{position:fixed;bottom:0;left:0;right:0;background:rgba(6,8,15,0.95);border-top:1px solid rgba(201,168,76,0.3);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;z-index:999}
.hc-left{display:flex;align-items:center;gap:12px}
.hc-players{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:1px}
.hc-scenario{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--gold);font-weight:700;letter-spacing:1px}
.hc-right{display:flex;gap:10px}
.btn{font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:2px;padding:10px 24px;border-radius:8px;cursor:pointer;border:none;transition:all 0.2s}
.btn-gold{background:var(--gold);color:#06080f}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;color:var(--gold);border:1px solid rgba(201,168,76,0.4)}
.btn-outline:hover{background:rgba(201,168,76,0.1)}
.btn-red{background:#7f1d1d;color:#fff;border:1px solid #ef4444}
.btn-red:hover{background:#991b1b}
.btn:disabled{opacity:0.3;cursor:not-allowed}

/* ── RUTH SPECIAL ── */
.ruth-stage{width:100%;max-width:1000px;margin:0 auto;text-align:center;padding:20px}
.ruth-q{font-family:'Bebas Neue',cursive;font-size:clamp(28px,5vw,56px);letter-spacing:3px;color:#fff;margin-bottom:16px;line-height:1}
.ruth-p{font-family:'Barlow Condensed',sans-serif;font-size:clamp(15px,2vw,20px);color:rgba(255,255,255,0.6);line-height:1.6;max-width:600px;margin:0 auto 24px}
.ruth-verse{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,2.5vw,26px);font-style:italic;color:var(--gold);padding:20px 32px;background:rgba(201,168,76,0.08);border-radius:12px;border-left:6px solid var(--gold);text-align:left;max-width:700px;margin:0 auto 24px}

/* ── TWIST BADGE ── */
.twist-pill{display:inline-block;background:#7f1d1d;color:#fff;font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:3px;padding:4px 14px;border-radius:6px;margin-bottom:12px}

/* ── DISCUSSION ── */
#s-discuss{background:var(--dark);justify-content:center;align-items:center;padding:48px}
.discuss-inner{max-width:800px;width:100%;text-align:center}
.discuss-title{font-family:'Bebas Neue',cursive;font-size:40px;letter-spacing:4px;color:var(--gold);margin-bottom:32px}
.discuss-q{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,2.5vw,26px);color:rgba(255,255,255,0.8);line-height:1.6;padding:18px 24px;background:rgba(255,255,255,0.03);border-radius:10px;border-left:4px solid var(--gold);text-align:left;margin-bottom:14px}
</style>
</head>

<!-- REVEAL -->
<div class="screen" id="s-reveal">

</div>

<!-- SCRIPTURE -->
<div class="screen" id="s-scripture">

<!-- DISCUSSION -->

// ── STATE ──────────────────────────────────────────────────────
let scenarioIdx = 0;
let currentScreen = 'intro';
let votes = {0:0, 1:0};
let totalVotes = 0;
let playerCount = 0;

// ── WEBSOCKET ──────────────────────────────────────────────────
const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${proto}://${location.host}?host`);

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  if (msg.type === 'votes') {
    votes = msg.votes;
    totalVotes = msg.total;
    updateVoteDisplay();
  }
  if (msg.type === 'playerCount') {
    playerCount = msg.count;
    document.getElementById('hc-players').textContent = playerCount + ' players';
    document.getElementById('player-count-intro').textContent = playerCount + ' players connected';
  }
};

// Set join URL
window.addEventListener('load', () => {
  const url = location.host;
  document.getElementById('join-url').textContent = url;
  buildCrewRow();
  buildScenario();
  updateControls();
});

// ── CREW ──────────────────────────────────────────────────────
function buildCrewRow() {
  const crew = [
    { img:'crew_ej', name:'Ernie Johnson', role:'Host' },
    { img:'crew_kenny', name:'Kenny Smith', role:'Analyst' },
    { img:'crew_shaq', name:'Shaquille O\'Neal', role:'Analyst' },
    { img:'crew_barkley', name:'Charles Barkley', role:'Analyst' },
  ];
  document.getElementById('crew-row').innerHTML = crew.map(c => `
    <div class="crew-card">
      <img class="crew-img" src="${IMGS[c.img]}" alt="${c.name}">
      <div class="crew-name">${c.name}</div>
      <div class="crew-role bbc">${c.role}</div>
    </div>`).join('');
}

// ── SHOW SCREEN ────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentScreen = id;
  document.getElementById('hc-scenario').textContent = SCENARIOS[scenarioIdx]?.name || 'Intro';
  updateControls();
}

// ── BUILD SCENARIO HEADER ──────────────────────────────────────
function buildScenario() {
  const s = SCENARIOS[scenarioIdx];
  const stage = document.getElementById('scenario-stage');
  const twist = s.isTwist ? `<div class="twist-pill">TWIST ROUND</div><br>` : s.isMod ? `<div class="twist-pill" style="background:#002B5C">MODERN SCENARIO</div><br>` : '';
  stage.innerHTML = `
    <div class="sc-logo-wrap">
      <img class="sc-logo" src="${IMGS[s.logo]}" alt="${s.name}">
      <div class="sc-logo-name bbn">${s.name}</div>
      <div class="sc-logo-city bbc">${s.city}</div>
    </div>
    <div class="sc-content">
      ${twist}
      <div class="sc-round bbc">${s.round}</div>
      <div class="sc-name bbn">${s.name}</div>
      <div class="sc-need-lbl bbc">Roster Need</div>
      <div class="sc-need bbc">${s.need}</div>
      <div class="sc-record bbn" style="color:${s.recC};border-color:${s.recC}40;background:${s.recC}15">${s.rec}</div>
      ${s.note ? `<div style="margin-top:14px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-style:italic;color:rgba(255,255,255,0.4)">${s.note}</div>` : ''}
    </div>`;
}

// ── BUILD VOTING CARDS ────────────────────────────────────────
function buildCards() {
  const s = SCENARIOS[scenarioIdx];
  votes = {0:0,1:0}; totalVotes = 0;
  document.getElementById('voting-round').textContent = s.round;
  document.getElementById('vote-live-count').textContent = '0';
  document.getElementById('voting-status').textContent = 'Voting Open';

  const stage = document.getElementById('cards-stage');
  if (s.isRuth) {
    stage.style.gridTemplateColumns = '1fr';
    stage.style.maxWidth = '520px';
    stage.style.margin = '0 auto';
  } else {
    stage.style.gridTemplateColumns = '1fr 1fr';
    stage.style.maxWidth = '';
    stage.style.margin = '0 auto';
  }
  stage.innerHTML = s.players.map((p,i) => buildBigCard(p, s, i)).join('');
}

function buildBigCard(p, s, i) {
  const bars = p.bars.map(b => `
    <div class="br">
      <span class="bl">${b.l}</span>
      <div class="bt"><div class="bf" style="width:${Math.max(0,typeof b.v==='number'?b.v:0)}%;background:${b.c}"></div></div>
      <span class="bn">${typeof b.v==='number'?Math.max(0,b.v):''}</span>
    </div>`).join('');
  const stats = p.stats.map(st => `<div class="s-c"><div class="s-v bbn">${st.v}</div><div class="s-l bbc">${st.l}</div></div>`).join('');
  const imgClass = p.isPhoto ? 'bc-img' : 'bc-img';
  return `<div class="big-card" id="card-${i}">
    <div class="bc-stripe" style="background:${p.stripe}"></div>
    <div class="bc-body">
      <img class="${imgClass}" src="${IMGS[p.img]}" alt="${p.name}" style="${p.isPhoto?'object-position:top center':'object-position:top'}">
      <div class="bc-info">
        <div class="bc-label bbc">Candidate ${i===0?'A':'B'}</div>
        <div class="bc-name bbn">${p.name}</div>
        <div class="bc-nick bbc">${p.nick}</div>
        <div class="bc-vitals">${[p.pos,p.ht,p.wt].map(v=>`<span class="vital bbc">${v}</span>`).join('')}</div>
        <div class="bc-from bbc">${p.from}</div>
      </div>
      <div class="bc-ovr">
        <div class="ovr-n bbn" style="color:${p.ovrC}">${p.ovr}</div>
        <div class="ovr-l bbc">OVR</div>
      </div>
    </div>
    <div class="card-div" style="height:1px;background:rgba(255,255,255,0.05);margin:0 16px"></div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);background:rgba(255,255,255,0.03)">${stats}</div>
    <div class="bc-bars">${bars}</div>
    <div style="padding:8px 18px 12px;border-top:1px solid rgba(255,255,255,0.05)">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:3px">Scout Report</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;font-style:italic;color:rgba(255,255,255,0.5);line-height:1.45">${p.scout}</div>
    </div>
    <div class="vote-bar-wrap" id="vote-wrap-${i}">
      <div class="vote-pct bbn" id="vote-pct-${i}">—</div>
      <div class="vote-pct-lbl bbc">of votes</div>
      <div class="vote-bar-bg"><div class="vote-bar-fill" id="vote-bar-${i}" style="width:0%"></div></div>
    </div>
  </div>`;
}

function updateVoteDisplay() {
  document.getElementById('vote-live-count').textContent = totalVotes;
  const total = (votes[0]||0) + (votes[1]||0);
  [0,1].forEach(i => {
    const v = votes[i]||0;
    const pct = total > 0 ? Math.round(v/total*100) : 0;
    const pctEl = document.getElementById(`vote-pct-${i}`);
    const barEl = document.getElementById(`vote-bar-${i}`);
    const cardEl = document.getElementById(`card-${i}`);
    if (pctEl) pctEl.textContent = pct + '%';
    if (barEl) barEl.style.width = pct + '%';
    if (cardEl) {
      cardEl.classList.toggle('leading', pct > 50);
    }
  });
}

// ── BUILD RESULTS ─────────────────────────────────────────────
function buildResults() {
  const s = SCENARIOS[scenarioIdx];
  const total = (votes[0]||0) + (votes[1]||0);
  const colors = ['#552583','#FDB927'];

  document.getElementById('results-bars').innerHTML = s.players.map((p,i) => {
    const v = votes[i]||0;
    const pct = total > 0 ? Math.round(v/total*100) : 0;
    return `<div class="res-candidate">
      <div class="res-name bbn">${p.name.split('"')[0]}</div>
      <div class="res-pct bbn" style="color:${p.stripe}">${pct}%</div>
      <div class="res-bar-bg"><div class="res-bar-fill" style="width:${pct}%;background:${p.stripe}"></div></div>
      <div class="res-count bbc">${v} votes</div>
    </div>`;
  }).join('');

  const ann = s.ann;
  let annHTML = `<div class="ann-who-row">
    <img class="ann-photo" src="${IMGS[ann.img]}" alt="${ann.who}">
    <div><div class="ann-name bbn" style="color:${ann.color}">${ann.who}</div><div class="ann-role bbc">Inside the NBA</div></div>
  </div>
  <div class="ann-quote bbc">${ann.quote}</div>`;

  if (s.ann2) {
    annHTML += `<div style="height:12px"></div><div class="ann-who-row">
      <img class="ann-photo" src="${IMGS[s.ann2.img]}" alt="${s.ann2.who}">
      <div><div class="ann-name bbn" style="color:${s.ann2.color}">${s.ann2.who}</div><div class="ann-role bbc">Inside the NBA</div></div>
    </div><div class="ann-quote bbc">${s.ann2.quote}</div>`;
  }
  if (s.ann3) {
    annHTML += `<div style="height:12px"></div><div class="ann-who-row">
      <img class="ann-photo" src="${IMGS[s.ann3.img]}" alt="${s.ann3.who}">
      <div><div class="ann-name bbn" style="color:${s.ann3.color}">${s.ann3.who}</div><div class="ann-role bbc">Inside the NBA</div></div>
    </div><div class="ann-quote bbc">${s.ann3.quote}</div>`;
  }

  document.getElementById('announcer-box').innerHTML = annHTML;
}

// ── BUILD REVEAL ──────────────────────────────────────────────
function buildReveal() {
  const s = SCENARIOS[scenarioIdx];
  const gp = s.isBothPick ? s.players : s.players.filter(p=>p.gp);
  const primary = gp[0];
  document.getElementById('reveal-inner').innerHTML = `
    <div class="rev-commissioner bbc">— Commissioner's Announcement —</div>
    <div class="rev-pick-num bbn">${s.isBothPick ? 'Both' : '#1 Overall Pick'}</div>
    <img class="rev-img" src="${IMGS[primary.img]}" alt="${primary.name}" style="${primary.isPhoto?'object-position:top center':'object-position:top'}">
    <div class="rev-player-name bbn">${s.isBothPick ? 'Moses & Aaron' : primary.name}</div>
    <p class="rev-why">${s.rWhy}</p>
    <div class="rev-quip bbc">${s.rQuip}</div>`;
}

// ── BUILD SCRIPTURE ───────────────────────────────────────────
function buildScripture() {
  const s = SCENARIOS[scenarioIdx];
  const nextS = SCENARIOS[scenarioIdx+1];
  document.getElementById('scripture-inner').innerHTML = `
    <div class="sc-icon">📖</div>
    <div class="scripture-lbl bbc">God's Wisdom</div>
    <div class="scripture-text bbc">${s.scripture}</div>
    ${nextS ? `<div class="next-up bbc">Next: ${nextS.name}</div>` : '<div class="next-up bbc" style="color:var(--gold)">Final Round Complete</div>'}`;
}

// ── BUILD DISCUSSION ──────────────────────────────────────────
function buildDiscussion() {
  const s = SCENARIOS[scenarioIdx];
  if (!s.disc) return;
  document.getElementById('discuss-inner').innerHTML = `
    <div class="discuss-title bbn">Discussion</div>
    ${s.disc.map(q=>`<div class="discuss-q bbc">${q}</div>`).join('')}`;
}

// ── HOST CONTROLS ─────────────────────────────────────────────
function advance(screen, extra={}) {
  ws.send(JSON.stringify({ type:'host_advance', screen, scenarioIdx, ...extra }));
  showScreen('s-'+screen);
  if (screen==='voting') { buildCards(); }
  if (screen==='results') { buildResults(); }
  if (screen==='reveal') { buildReveal(); }
  if (screen==='scripture') { buildScripture(); }
  if (screen==='discuss') { buildDiscussion(); }
}

function nextScenario() {
  if (scenarioIdx < SCENARIOS.length-1) {
    scenarioIdx++;
    buildScenario();
    advance('scenario');
  }
}

function updateControls() {
  const s = SCENARIOS[scenarioIdx];
  const btns = document.getElementById('hc-buttons');
  const isRuth = s?.isRuth;
  const hasDisc = s?.disc;

  const map = {
    'intro':     `<button class="btn btn-gold" onclick="advance('scenario')">Start Draft</button>`,
    'scenario':  `<button class="btn btn-gold" onclick="advance('voting')">Open Voting</button>`,
    'voting':    `<button class="btn btn-red" onclick="advance('results')">Close Voting</button>`,
    'results':   `<button class="btn btn-gold" onclick="advance('reveal')">Reveal God's Pick</button>`,
    'reveal':    `<button class="btn btn-gold" onclick="advance('scripture')">Show Scripture</button>`,
    'scripture': hasDisc
      ? `<button class="btn btn-outline" onclick="advance('discuss')">Discussion</button><button class="btn btn-gold" onclick="nextOrEnd()">Next Team</button>`
      : `<button class="btn btn-gold" onclick="nextOrEnd()">Next Team</button>`,
    'discuss':   `<button class="btn btn-gold" onclick="nextOrEnd()">Next Team</button>`,
  };

  if (isRuth && currentScreen === 'scenario') {
    btns.innerHTML = `<button class="btn btn-gold" onclick="advance('reveal')">Reveal Her Story</button>`;
  } else {
    btns.innerHTML = map[currentScreen.replace('s-','')] || '';
  }
}

function nextOrEnd() {
  if (scenarioIdx < SCENARIOS.length-1) {
    scenarioIdx++;
    buildScenario();
    advance('scenario');
  } else {
    advance('yourturn');
  }
}

// Override showScreen to also send WS
const _show = showScreen;
showScreen = function(id) {
  _show(id);
  updateControls();
};
</script>
